name: remove-result-banners

on:
  workflow_dispatch:
  push:
    paths:
      - "inject_banner.py"
      - "**/*.html"
      - "imagens/aguiabanner.webp"
      - ".github/workflows/remove-result-banners.yml"

jobs:
  update-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rodar inject_banner.py
        run: python inject_banner.py

      - name: Verificar mudanças
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commitar alterações
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Atualiza banner automaticamente"
          git push
