import re
from pathlib import Path

PATTERNS = [
    re.compile(
        r'<div class="table-wrapper">\s*<a href="/gordoloterias">\s*<img src="\./banner/gordoloterias\.jpg"[^>]*>\s*</a>\s*</div>',
        re.IGNORECASE | re.DOTALL
    ),
    re.compile(
        r'<div class="table-wrapper">\s*<a href="/gordoloterias">\s*<img src="\.\./banner/gordoloterias\.jpg"[^>]*>\s*</a>\s*</div>',
        re.IGNORECASE | re.DOTALL
    ),
    re.compile(
        r'<div class="table-wrapper">\s*<a href="https://app\.bancalitoral\.com/pr/g5P71dlw"[^>]*>\s*<img src="\./banner/litoraldasorte\.jpg"[^>]*>\s*</a>\s*</div>',
        re.IGNORECASE | re.DOTALL
    ),
    re.compile(
        r'<div class="table-wrapper">\s*<a href="https://app\.bancalitoral\.com/pr/g5P71dlw"[^>]*>\s*<img src="\.\./banner/litoraldasorte\.jpg"[^>]*>\s*</a>\s*</div>',
        re.IGNORECASE | re.DOTALL
    ),
]

def process_html_file(file_path: Path):
    content = file_path.read_text(encoding="utf-8", errors="ignore")
    original = content

    for pattern in PATTERNS:
        content = pattern.sub("", content)

    if content != original:
        file_path.write_text(content, encoding="utf-8")
        return True
    return False

def main():
    updated = []
    for file_path in Path(".").rglob("*.html"):
        if process_html_file(file_path):
            updated.append(str(file_path))

    print(f"Arquivos atualizados: {len(updated)}")
    for item in updated:
        print(item)

if __name__ == "__main__":
    main()
